version: "3.8"

services:
  notion-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notion-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NOTION_TOKEN: ${NOTION_TOKEN}
    ports:
      - "3000:3000"
    env_file:
        - .env
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
